name: Update TLE Data

on:
  schedule:
    - cron: "0 */12 * * *"  # Every 12 hours
  workflow_dispatch:         # Allow manual trigger from GitHub UI

concurrency:
  group: tle-update
  cancel-in-progress: true   # If a new run starts, cancel the previous one

jobs:
  update-tles:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Needed to commit back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1     # Ensures --force-with-lease has a proper ref to compare

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch TLEs
        run: python fetch_tles.py

      - name: Commit updated TLEs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tles.json
          git diff --cached --quiet || git commit -m "chore: update TLE data [skip ci]"
          git push --force
